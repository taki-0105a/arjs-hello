<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>AR.js Hello World</title>

  <!-- カメラ制約の調整：背面カメラを「希望」に留め、厳格な制約を外す。
       これにより背面カメラの無いPC（Mac 等）でも前面カメラで動作する。
       ※ AR.js より前に読み込むこと（getUserMedia を先に差し替える） -->
  <script>
    (function () {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
      var orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
      navigator.mediaDevices.getUserMedia = function (constraints) {
        try {
          if (constraints && typeof constraints.video === 'object') {
            // facingMode を非 exact の「希望」にし、解像度等の厳格な制約を除去
            constraints = Object.assign({}, constraints, {
              video: { facingMode: 'environment' }
            });
          }
        } catch (e) { /* 失敗時は元の制約のまま */ }
        return orig(constraints);
      };
    })();
  </script>

  <!-- A-Frame（3D/WebXR フレームワーク） -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- AR.js（A-Frame 版） -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* 使い方の簡単な説明バー */
    .hint {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 999;
      background: rgba(31, 58, 95, 0.85); /* ネイビー */
      color: #fff;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      font-size: 14px;
      text-align: center;
      padding: 8px 10px;
      line-height: 1.5;
    }
    .hint a { color: #FFD9A0; }
  </style>
</head>
<body>
  <!-- embedded: ページ内に埋め込み表示 / arjs: AR.js を有効化 -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;">

    <!-- オリジナルの「AR.js」マーカー（my-icon-marker.patt）を認識 -->
    <a-marker type="pattern" url="my-icon-marker.patt">
      <!-- マーカー上に "Hello World" を表示 -->
      <a-text
        value="Hello World"
        align="center"
        color="#1F3A5F"
        width="4"
        position="0 0.1 0"
        rotation="-90 0 0">
      </a-text>
      <!-- 文字の下に薄い白の板を敷いて視認性を上げる -->
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="2.2"
        height="1.2"
        color="#FFFFFF"
        opacity="0.75">
      </a-plane>
    </a-marker>

    <!-- AR 用カメラ -->
    <a-entity camera></a-entity>
  </a-scene>

  <div class="hint">
    「AR.js」マーカーをカメラに写すと <b>Hello World</b> が表示されます。
  </div>
</body>
</html>
